services:
  backend:
    build:
      context: ..
      dockerfile: xfa-web/Dockerfile.dev
    volumes:
      - ../pdfer:/app/pdfer
      - ../xfa-web:/app/xfa-web
    ports:
      - "8080:8080"

  frontend:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules  # anonymous volume shadows macOS node_modules
    environment:
      - BACKEND_URL=http://backend:8080
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
